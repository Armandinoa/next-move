name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke-test:
    name: Smoke test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile CLI
        run: python -m py_compile next_move.py

      - name: Run JSON smoke test
        run: python next_move.py --repo . --json

      - name: Run demo smoke test
        run: python next_move.py --demo

      - name: Run self-improve smoke test
        run: python next_move.py --repo . --self-improve --self-improve-output /tmp/NEXT_ACTION.md
